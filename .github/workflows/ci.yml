name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # React overlay — typecheck + build
  # ─────────────────────────────────────────────────────────────────
  overlay:
    name: turbosight-react-overlay
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -w @thinkgrid/turbosight

      - name: Unit tests
        run: npm test -w @thinkgrid/turbosight

      - name: Build
        run: npm run build -w @thinkgrid/turbosight

      - name: Assert dist exists
        run: |
          test -f turbosight-react-overlay/dist/index.js   || (echo "dist/index.js missing"   && exit 1)
          test -f turbosight-react-overlay/dist/index.cjs  || (echo "dist/index.cjs missing"  && exit 1)
          test -f turbosight-react-overlay/dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)

  # ─────────────────────────────────────────────────────────────────
  # SWC plugin — Rust build + tests
  # ─────────────────────────────────────────────────────────────────
  swc-plugin:
    name: turbosight-swc-plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: turbosight-swc-plugin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: turbosight-swc-plugin

      - name: Run tests
        run: cargo test

      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip1 --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbosight-swc-plugin-wasm
          path: turbosight-swc-plugin/target/wasm32-wasip1/release/turbosight_swc_plugin.wasm
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # test-app — Next.js production build
  # ─────────────────────────────────────────────────────────────────
  test-app:
    name: test-app build
    runs-on: ubuntu-latest
    needs: [overlay, swc-plugin]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain (for WASM plugin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: turbosight-swc-plugin

      - name: Build SWC plugin WASM
        run: cargo build --target wasm32-wasip1 --release
        working-directory: turbosight-swc-plugin

      - name: Install all dependencies
        run: npm ci

      - name: Build overlay
        run: npm run build -w @thinkgrid/turbosight

      - name: Build test-app
        run: npm run build -w test-app
        env:
          NODE_ENV: production
